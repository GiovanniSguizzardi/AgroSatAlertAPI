spring.application.name=agrosatalert
server.port=9000

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/agrosat_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=agrosat2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.format-sql=true

# Swagger - disponivel na rota raiz
springdoc.swagger-ui.path=/
springdoc.api-docs.path=/api-docs